name: Detect Changes
description: 変更パスから CD 各デプロイの実行要否フラグを算出する

inputs:
  base:
    description: 比較対象の ref。チェックアウト済みの履歴で解決できること
    required: true

outputs:
  web:
    description: web(＋共有コード)の変更有無。web デプロイの要否
    value: ${{ steps.detect.outputs.web }}
  cron:
    description: cron(＋共有コード)の変更有無。cron デプロイの要否
    value: ${{ steps.detect.outputs.cron }}
  database:
    description: マイグレーションの変更有無。D1 適用の要否
    value: ${{ steps.detect.outputs.database }}

runs:
  using: composite
  steps:
    - name: 変更パスの検知
      id: detect
      shell: bash
      env:
        BASE: ${{ inputs.base }}
      run: |
        set -euo pipefail

        # ルート直下の .md（README / CLAUDE 等）はデプロイに影響しないため差分から除く。
        # フラット化で root='^[^/]+$' がこれらを拾い、web / cron デプロイが誤発火するのを防ぐ
        files=$(git diff --name-only "$BASE" HEAD | grep -vE '\.md$' || true)
        changed() { grep -qE "$1" <<<"$files"; }

        # パッケージ間の依存関係は追わず粗く判定する。デプロイは冪等で過剰実行の害がない
        # ため、厳密な選別より判定の単純さを優先する
        pkgs='^packages/'
        root='^[^/]+$'

        web=false;      if changed "^apps/web/|$pkgs|$root"; then web=true; fi
        cron=false;     if changed "^apps/cron/|$pkgs|$root"; then cron=true; fi
        database=false; if changed "^packages/datastore/migrations/"; then database=true; fi

        {
          echo "web=$web"
          echo "cron=$cron"
          echo "database=$database"
        } >> "$GITHUB_OUTPUT"
        echo "web=$web cron=$cron database=$database"
