name: Setup Supabase Emulator Composite Action
description: 'rin2yh/supa-emu の GitHub Releases からバイナリを取得して起動する'

inputs:
  version:
    description: '取得する supa-emu のリリースタグ (例: v0.1.0)'
    required: false
    default: 'v0.1.0'
  repo:
    description: 'バイナリ取得元リポジトリ'
    required: false
    default: 'rin2yh/supa-emu'
  github-token:
    description: 'GitHub Releases 取得用トークン'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: バイナリを取得
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VERSION: ${{ inputs.version }}
        REPO: ${{ inputs.repo }}
      run: |
        set -euo pipefail
        os="$(uname -s | tr '[:upper:]' '[:lower:]')"   # linux / darwin
        arch="$(uname -m)"
        case "$arch" in
          x86_64|amd64) arch=amd64 ;;
          arm64|aarch64) arch=arm64 ;;
          *) echo "::error::unsupported arch: $arch"; exit 1 ;;
        esac

        # RUNNER_TEMP が空だと work が /supa-emu になり rm -rf が危険なため事前にガードする
        : "${RUNNER_TEMP:?RUNNER_TEMP is empty or unset}"
        work="$RUNNER_TEMP/supa-emu"
        # セルフホストランナーでの前回ジョブの残骸を排除して状態を初期化する
        rm -rf "$work"
        mkdir -p "$work"
        # GoReleaser のアセット名: supabase-emulator_<version>_<os>_<arch>.tar.gz
        # バージョンを問わず glob で一致させる
        gh release download "$VERSION" \
          --repo "$REPO" \
          --pattern "supabase-emulator_*_${os}_${arch}.tar.gz" \
          --dir "$work" --clobber

        # pattern で 1 ファイルだけ DL されるため glob は *.tar.gz で十分
        tar -xzf "$work"/*.tar.gz -C "$work"
        chmod +x "$work/supabase-emulator"
        echo "EMULATOR_BIN=$work/supabase-emulator" >> "$GITHUB_ENV"

    - name: Emulator を起動
      shell: bash
      run: |
        set -euo pipefail
        "$EMULATOR_BIN" -addr 127.0.0.1:54321 > "$RUNNER_TEMP/emulator.log" 2>&1 &
        for _ in {1..200}; do
          curl -sf http://127.0.0.1:54321/auth/v1/health > /dev/null && exit 0
          sleep 0.05
        done
        cat "$RUNNER_TEMP/emulator.log"
        exit 1
