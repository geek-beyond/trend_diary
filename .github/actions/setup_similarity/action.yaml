name: Setup similarity-ts Composite Action
description: 'similarity-ts の prebuilt バイナリを取得して PATH に載せる Composite Action'

inputs:
  version:
    description: 'similarity-ts のバージョン（GitHub Releases のタグ）'
    required: true
    default: '0.5.0'

runs:
  using: 'composite'
  steps:
    # コンパイル不要な prebuilt バイナリをバージョン単位でキャッシュする
    - name: similarity-ts のキャッシュ
      id: cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
      with:
        path: ${{ runner.tool_cache }}/similarity-ts/${{ inputs.version }}
        key: similarity-ts-${{ runner.os }}-${{ runner.arch }}-${{ inputs.version }}

    - name: similarity-ts の取得
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        DEST: ${{ runner.tool_cache }}/similarity-ts/${{ inputs.version }}
      run: |
        set -euo pipefail
        asset="similarity-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
        url="https://github.com/mizchi/similarity/releases/download/v${VERSION}/${asset}"
        mkdir -p "$DEST"
        tmp="$(mktemp -d)"
        curl -fsSL "$url" -o "$tmp/${asset}"
        tar -xzf "$tmp/${asset}" -C "$tmp"
        # アーカイブは複数バイナリを含むため similarity-ts のみ取り出す
        bin="$(find "$tmp" -type f -name similarity-ts | head -n 1)"
        if [[ -z "$bin" ]]; then
          echo "::error::アーカイブ内に similarity-ts が見つかりません: $url"
          exit 1
        fi
        install -m 0755 "$bin" "$DEST/similarity-ts"

    - name: PATH への追加
      shell: bash
      run: echo "${{ runner.tool_cache }}/similarity-ts/${{ inputs.version }}" >> "$GITHUB_PATH"
