name: Setup Supabase Composite Action
description: 'SupabaseをセットアップするComposite Action'

inputs:
  cli-version:
    description: 'pinするSupabase CLIのバージョン（Dockerイメージのtagもこれで決まるためキャッシュキーにもなるよう単一の真実源として扱う）'
    required: false
    default: '2.105.0'

runs:
  using: 'composite'
  steps:
    - name: Supabase CLIのセットアップ
      # versionをpinしないとlatestが浮動で入りDockerイメージのtagも変わってキャッシュが安定しないため明示的に固定する
      uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
      with:
        version: ${{ inputs.cli-version }}

    - name: Dockerイメージレジストリの解決
      id: registry
      shell: bash
      # キャッシュキーと保存フィルタで同一レジストリを使うための単一の真実源。SUPABASE_INTERNAL_IMAGE_REGISTRYはworkflowでenv宣言されずenvコンテキストでは解決できないため、実際のOS環境変数を読むbashで解決する
      run: echo "value=${SUPABASE_INTERNAL_IMAGE_REGISTRY:-public.ecr.aws}" >> "$GITHUB_OUTPUT"

    - name: Dockerイメージキャッシュの復元
      id: image-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cache/supabase-docker-images.tar
        # CLIバージョンが同じならtagも同一でリポジトリ全体（mainのキャッシュ）を共有できるため、ブランチ非依存の静的キーにする。レジストリが異なるとtarのイメージtagも変わり復元しても使えないためキーに含めて分離する
        key: supabase-docker-images-${{ runner.os }}-${{ inputs.cli-version }}-${{ steps.registry.outputs.value }}

    - name: キャッシュ済みDockerイメージの読み込み
      # ヒット時はここで読み込んでおくとsupabase startがレジストリからpullせず起動が速くなる
      if: steps.image-cache.outputs.cache-hit == 'true'
      shell: bash
      run: docker load -i ~/.cache/supabase-docker-images.tar

    - name: Supabaseの起動
      shell: bash
      working-directory: .
      # INFO: 認証のみ起動
      # link: https://supabase.com/docs/reference/cli/supabase-start
      run: supabase start -x realtime,storage-api,imgproxy,mailpit,postgrest,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

    - name: Dockerイメージキャッシュの保存
      # ミス時のみtarを書き出す。actions/cacheのpostステップがこのtarをアップロードする
      if: steps.image-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p ~/.cache
        # SUPABASE_INTERNAL_IMAGE_REGISTRYでレジストリを上書きしている場合（このリポジトリはghcr.io）はそのprefixでpullされるため、フィルタも同じレジストリに揃えないと保存対象が空になりキャッシュが一切保存されない
        mapfile -t images < <(docker images --filter "reference=${{ steps.registry.outputs.value }}/supabase/*" --format '{{.Repository}}:{{.Tag}}')
        if [[ ${#images[@]} -eq 0 ]]; then
          echo "::warning::キャッシュ対象のSupabaseイメージが見つかりませんでした"
          exit 0
        fi
        docker save -o ~/.cache/supabase-docker-images.tar "${images[@]}"

    - name: Supabaseのキーを環境変数に設定
      id: get-keys
      shell: bash
      working-directory: .
      run: |
        set -euo pipefail
        SUPABASE_ENV="$(supabase status --output env)"
        SUPABASE_ANON_KEY="$(echo "$SUPABASE_ENV" | sed -n 's/^ANON_KEY=//p' | head -n 1)"
        SUPABASE_URL="$(echo "$SUPABASE_ENV" | sed -n 's/^API_URL=//p' | head -n 1)"

        if [[ -z "$SUPABASE_URL" ]]; then
          SUPABASE_URL="http://127.0.0.1:54321"
        fi

        if [[ -z "$SUPABASE_ANON_KEY" ]]; then
          echo "::error::Failed to read SUPABASE_ANON_KEY from 'supabase status --output env'."
          echo "$SUPABASE_ENV"
          exit 1
        fi

        echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> "$GITHUB_ENV"
        echo "SUPABASE_URL=$SUPABASE_URL" >> "$GITHUB_ENV"
