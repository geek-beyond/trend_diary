version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/application"
    schedule:
      interval: "weekly"
    # pnpm の minimumReleaseAge(3日) と揃え、公開直後のパッケージを提案しない。
    # CVE等のセキュリティ更新はクールダウン対象外で即時PRが作成される。
    cooldown:
      default-days: 3
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
