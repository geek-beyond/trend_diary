version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # pnpm の minimumReleaseAge(3日=4320分) より長くする。
    # 同日数だと Dependabot(日単位判定) が選んだ版を pnpm(分単位判定) が
    # 境界差で弾き、lockfile 更新が "No matching version found" で失敗して
    # PR が作られなくなる（dependabot-core#13165）。閾値に余裕を持たせて回避する。
    # CVE等のセキュリティ更新はクールダウン対象外で即時PRが作成される。
    cooldown:
      default-days: 5
    # 単一の pnpm-lock.yaml を複数 PR が同時に書き換えると相互に競合し、
    # branch protection 下では Dependabot がリベースを完了できず詰まる。
    # minor/patch を 1 PR に集約して lockfile 変更を 1 回に束ね、競合を防ぐ。
    # major は個別 PR のまま残し、破壊的変更を単独でレビューできるようにする。
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
