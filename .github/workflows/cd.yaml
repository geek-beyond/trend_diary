name: CD
description: Continuous Delivery

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 対象リソース
        required: true
        default: web
        type: choice
        options:
          - web
          - cron
          - database

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: ./application

jobs:
  changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      web: ${{ steps.detect.outputs.web }}
      cron: ${{ steps.detect.outputs.cron }}
      database: ${{ steps.detect.outputs.database }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # CI を通過したコミットをデプロイ対象にする(手動実行時はデフォルトブランチ)
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          # ひとつ前のコミットとの差分を取るため
          fetch-depth: 2
          persist-credentials: false
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          DEPLOY_TYPE: ${{ github.event.inputs.deploy_type }}
        run: |
          set -euo pipefail

          web=false
          cron=false
          database=false

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            case "$DEPLOY_TYPE" in
              web) web=true ;;
              cron) cron=true ;;
              database) database=true ;;
            esac
          else
            files=$(git diff --name-only HEAD~1 HEAD)

            # web と cron が共通で依存するパッケージとルート設定(変わると両方を再デプロイ)
            shared='application/packages/(common|datastore|domain|notification)/|application/(package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|tsconfig(\.base)?\.json)$'

            if grep -qE "application/packages/web/|$shared" <<<"$files"; then web=true; fi
            if grep -qE "application/packages/cron/|$shared" <<<"$files"; then cron=true; fi
            if grep -qE 'application/packages/datastore/migrations/' <<<"$files"; then database=true; fi
          fi

          {
            echo "web=$web"
            echo "cron=$cron"
            echo "database=$database"
          } >> "$GITHUB_OUTPUT"
          echo "デプロイ対象: web=$web cron=$cron database=$database"

          # ジョブサマリにデプロイ対象を記載(対象が無い場合はスキップ相当である旨を明記)
          {
            echo "## CD デプロイ対象"
            if [[ "$web" == "false" && "$cron" == "false" && "$database" == "false" ]]; then
              echo "デプロイ対象なし（実質スキップ）"
            else
              echo "| リソース | デプロイ |"
              echo "| --- | --- |"
              echo "| web | $web |"
              echo "| cron | $cron |"
              echo "| database | $database |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: ビルド
        run: pnpm run build

      - name: デプロイ
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./application/packages/web
          command: deploy
          # Secretsで保存するものをActionsで管理し、環境変数として渡す
          secrets: |
            SUPABASE_URL
            SUPABASE_ANON_KEY
            DISCORD_WEBHOOK_URL
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: デプロイの出力を表示
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo $CMD_OUTPUT

  cron:
    needs: changes
    if: ${{ needs.changes.outputs.cron == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false

      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: Cron Workerをデプロイ
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./application/packages/cron
          command: deploy
          secrets: |
            DISCORD_WEBHOOK_URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: デプロイの出力を表示
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo "$CMD_OUTPUT"

  database:
    needs: changes
    if: ${{ needs.changes.outputs.database == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: D1のマイグレーション適用
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./application/packages/web
          command: d1 migrations apply trend-diary-db --remote
