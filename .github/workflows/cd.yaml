name: CD
description: Continuous Delivery

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 対象リソース
        required: true
        default: web
        type: choice
        options:
          - web
          - cron
          - database

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: .

jobs:
  changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      web: ${{ steps.manual.outputs.web || steps.detect.outputs.web }}
      cron: ${{ steps.manual.outputs.cron || steps.detect.outputs.cron }}
      database: ${{ steps.manual.outputs.database || steps.detect.outputs.database }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # CI を通過したコミットをデプロイ対象にする(手動実行時はデフォルトブランチ)
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          # ひとつ前のコミットとの差分を取るため
          fetch-depth: 2
          persist-credentials: false
      - name: 手動実行の対象指定
        id: manual
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          DEPLOY_TYPE: ${{ github.event.inputs.deploy_type }}
        run: echo "${DEPLOY_TYPE}=true" >> "$GITHUB_OUTPUT"

      - id: detect
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: ./.github/actions/detect-changes
        with:
          # CIを通過したコミットとその直前との差分をデプロイ対象にする
          base: HEAD~1

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: ビルド
        run: pnpm run build

      - name: デプロイ
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./apps/web
          command: deploy
          # Secretsで保存するものをActionsで管理し、環境変数として渡す
          secrets: |
            SUPABASE_URL
            SUPABASE_ANON_KEY
            DISCORD_WEBHOOK_URL
            TURNSTILE_SECRET_KEY
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

      - name: デプロイの出力を表示
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo $CMD_OUTPUT

      - name: スモークテスト(ヘルスチェック)
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          set -euo pipefail

          # デプロイ直後はWorkerの反映に数秒のラグがあるためリトライする
          for attempt in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "${DEPLOYMENT_URL}/api/health"; then
              echo "ヘルスチェック成功"
              exit 0
            fi
            echo "ヘルスチェック失敗 (試行 ${attempt}/5)。5秒後にリトライします"
            sleep 5
          done

          echo "ヘルスチェックが規定回数失敗しました"
          exit 1

      - name: スモークテスト失敗をDiscordへ通知
        if: ${{ failure() && steps.deploy.conclusion == 'success' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL}" ]]; then
            echo "DISCORD_WEBHOOK_URLが未設定のため通知をスキップします"
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\": \":rotating_light: webデプロイ後のヘルスチェックに失敗しました\n${RUN_URL}\"}" \
            "${DISCORD_WEBHOOK_URL}"

  cron:
    needs: changes
    if: ${{ needs.changes.outputs.cron == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false

      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: Cron Workerをデプロイ
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./apps/cron
          command: deploy
          secrets: |
            DISCORD_WEBHOOK_URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: デプロイの出力を表示
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo "$CMD_OUTPUT"

  database:
    needs: changes
    if: ${{ needs.changes.outputs.database == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: D1のマイグレーション適用
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./apps/web
          command: d1 migrations apply trend-diary-db --remote
