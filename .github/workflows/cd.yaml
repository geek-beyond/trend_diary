name: CD
description: Continuous Delivery

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 手動デプロイ対象（変更検知をスキップして強制デプロイ）
        required: true
        default: web
        type: choice
        options:
          - web
          - cron
          - database

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  # デプロイは途中でキャンセルせず、直列に流す
  cancel-in-progress: false

defaults:
  run:
    shell: bash
    working-directory: ./application

jobs:
  # CI 成功(push 由来)時は変更パッケージのみ、手動実行時は選択リソースのみをデプロイ対象とする
  changes:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      web: ${{ steps.detect.outputs.web || steps.dispatch.outputs.web }}
      cron: ${{ steps.detect.outputs.cron || steps.dispatch.outputs.cron }}
      database: ${{ steps.detect.outputs.schema || steps.dispatch.outputs.database }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # CI を通過した commit をデプロイ対象にする（手動実行時はデフォルトブランチ）
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          # 直前コミットとの差分を取るため履歴を全取得
          fetch-depth: 0
          persist-credentials: false

      # 手動実行: 変更検知をスキップし、選択リソースのみ強制デプロイ
      - id: dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          DEPLOY_TYPE: ${{ github.event.inputs.deploy_type }}
        run: |
          set -euo pipefail
          web=false; cron=false; database=false
          case "$DEPLOY_TYPE" in
            web) web=true ;;
            cron) cron=true ;;
            database) database=true ;;
          esac
          {
            echo "web=$web"
            echo "cron=$cron"
            echo "database=$database"
          } >> "$GITHUB_OUTPUT"
          echo "手動デプロイ: web=$web cron=$cron database=$database"

      # push(main) 由来: 直前コミットとの差分から依存グラフを評価して対象を決定
      - id: detect
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: ./.github/actions/detect-changes
        with:
          # head_sha の第一親(=push 前の main 先端)との差分で判定する
          base: HEAD~1
          fetch: false
          node-version-file: .node-version

  web:
    needs: [changes, database]
    runs-on: ubuntu-latest
    environment: production
    # database が動く場合はマイグレーション後にデプロイする（skip 時も実行できるよう !cancelled() で判定）
    if: ${{ !cancelled() && needs.changes.outputs.web == 'true' && needs.database.result != 'failure' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: ビルド
        run: pnpm run build

      - name: デプロイ
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./application/packages/web
          command: deploy
          # Secretsで保存するものをActionsで管理し、環境変数として渡す
          secrets: |
            SUPABASE_URL
            SUPABASE_ANON_KEY
            DISCORD_WEBHOOK_URL
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: デプロイの出力を表示
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo "$CMD_OUTPUT"

  cron:
    needs: changes
    runs-on: ubuntu-latest
    environment: production
    if: ${{ needs.changes.outputs.cron == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false

      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: Cron Workerをデプロイ
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./application/packages/cron
          command: deploy
          secrets: |
            DISCORD_WEBHOOK_URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: デプロイの出力を表示
        env:
          CMD_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: echo "$CMD_OUTPUT"

  database:
    needs: changes
    runs-on: ubuntu-latest
    environment: production
    if: ${{ needs.changes.outputs.database == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: .node-version

      - name: D1のマイグレーション適用
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./application/packages/web
          command: d1 migrations apply trend-diary-db --remote
