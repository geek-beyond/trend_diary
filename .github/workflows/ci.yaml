name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION_FILE: .node-version
  DATABASE_URL: file:./test.db

defaults:
  run:
    shell: bash
    working-directory: ./application

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      web: ${{ steps.detect.outputs.web }}
      e2e: ${{ steps.detect.outputs.e2e }}
      schema: ${{ steps.detect.outputs.schema }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # pnpm がベースブランチとの差分でパッケージを選ぶため全履歴を取得する
          fetch-depth: 0
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      # pnpm の依存グラフで「変更パッケージ＋その依存元」を算出し、後続ジョブの実行要否を決める
      - name: 変更パッケージの検知
        id: detect
        env:
          # mainへのpushではbase_refが空になり全件実行になる
          BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          filter_args=(-r)
          if [[ -n "$BASE" ]]; then
            git fetch --no-tags origin "$BASE"
            # ルート設定やCI定義の変更は全パッケージに影響しうるため全件扱いにする
            if [[ -z "$(git diff --name-only "origin/${BASE}" HEAD -- \
                package.json pnpm-lock.yaml pnpm-workspace.yaml tsconfig.base.json tsconfig.json \
                vitest.coverage.ts \
                ../.github/workflows/ci.yaml ../.github/actions)" ]]; then
              filter_args=(-r --filter "...[origin/${BASE}]")
            fi
          fi

          # `pnpm exec pwd` は対象パッケージのルートを1行ずつ返すため、パス末尾のディレクトリ名が
          # そのまま短縮名になる。パス以外の行(該当なし通知やワークスペースルート)は除外する
          names=$(pnpm "${filter_args[@]}" exec pwd \
            | awk -v root="$PWD" 'index($0, root "/") == 1 { sub(".*/", ""); print }' \
            | sort -u)
          echo "変更パッケージ(依存元含む): ${names:-(なし)}"

          has() { grep -qx "$1" <<<"$names"; }

          # web と e2e は専用ジョブで実行するため unit-test の matrix から除外する
          items=""
          for name in $names; do
            if [[ "$name" != web && "$name" != e2e ]]; then items+="\"${name}\","; fi
          done

          web=false
          if has web; then web=true; fi

          e2e=false
          if has e2e || [[ "$web" == "true" ]]; then e2e=true; fi

          # スキーマ関連ファイルはdatastore配下に閉じており検査も軽量なため、datastoreの変更有無で代用する
          schema=false
          if has datastore; then schema=true; fi

          {
            echo "packages=[${items%,}]"
            echo "web=$web"
            echo "e2e=$e2e"
            echo "schema=$schema"
          } >> "$GITHUB_OUTPUT"

  code-quality:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      # pnpm lint に含まれる pnpm -r typecheck を型チェックの単一責務とし、他ジョブでは型チェックしない
      - name: Lint
        run: pnpm lint

  unit-test:
    needs: changes
    if: ${{ needs.changes.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: テスト
        run: pnpm --filter @trend-diary/${{ matrix.package }} test

  web-build:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: ビルド
        run: pnpm run build

  client-test:
    name: unit-test (web client)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    # test_cov のカバレッジコメント投稿に必要
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: クライアントのテスト
        uses: ./.github/actions/test_cov
        with:
          target: client

  server-test:
    name: integration-test (web server)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    # test_cov のカバレッジコメント投稿に必要
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Supabase Emulator のセットアップ
        uses: rin2yh/supa-emu@2cdf06de6d58bee6e22adaf6e4c2dad55e414977 # v0.1.8
        with:
          version: v0.1.8
          addr: 127.0.0.1:54321
          webauthn-rp-id: 127.0.0.1

      - name: サーバーのテスト
        uses: ./.github/actions/test_cov
        with:
          target: server

  component-test:
    name: integration-test (web component)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Playwrightブラウザのキャッシュ
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Playwrightのセットアップ(キャッシュミス)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @trend-diary/web exec playwright install chromium --with-deps

      - name: Playwright依存のセットアップ(キャッシュヒット)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @trend-diary/web exec playwright install-deps chromium

      - name: コンポーネントのテスト
        run: pnpm --filter @trend-diary/web test --project storybook --coverage

  schema:
    needs: changes
    if: ${{ needs.changes.outputs.schema == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: マイグレーション生成（未生成の差分があれば検出）
        run: pnpm --filter @trend-diary/datastore db:generate

      - name: 生成差分の検出（差分があればドリフト）
        run: |
          git add -N packages/datastore/migrations
          git diff --exit-code -- packages/datastore/migrations

      - name: journal整合の検証
        run: pnpm --filter @trend-diary/datastore db:check

  e2e:
    name: E2E
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # PRの差分実行(--only-changed)がベースブランチとの比較に全履歴を要するため取得する
          fetch-depth: 0
          persist-credentials: false

      - name: Supabaseのセットアップ
        uses: ./.github/actions/setup_supabase

      - name: E2E環境のセットアップ
        uses: ./.github/actions/setup_e2e
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Create .dev.vars for Actions
        run: |
          cat > apps/web/.dev.vars <<'EOF'
          # Dev env for Actions (created from secrets)
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          SUPABASE_URL=${{ env.SUPABASE_URL || 'http://127.0.0.1:54321' }}
          SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY || '' }}
          # 本番sitekeyはheadlessで解けずトークン取得待ちがflakyになる。サーバーはsecret未設定で検証skipのため、空指定でwrangler.tomlの[vars]を上書きしウィジェットごと無効化して整合させる
          TURNSTILE_SITE_KEY=
          # 共有エッジキャッシュはE2Eのテスト間分離を壊すため無効化する（本番は既定で有効）
          EDGE_CACHE_DISABLED=true
          EOF

      # --only-changed は import 依存でテストを選ぶが、E2Eは apps/web を import しないため web の変更を拾えない。web変更のあるPRと main への push は全実行し、それ以外(e2eのみの変更)は差分実行する
      - name: E2Eテストの実行
        env:
          WEB_CHANGED: ${{ needs.changes.outputs.web }}
        run: |
          args=(--fail-on-flaky-tests)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            args+=(--reporter=github,html)
            if [[ "$WEB_CHANGED" != "true" ]]; then
              args+=(--only-changed=origin/"$GITHUB_BASE_REF" --pass-with-no-tests)
            fi
          fi
          pnpm --filter @trend-diary/e2e test "${args[@]}"

      - name: Playwrightレポートを保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-report-${{ github.event_name == 'pull_request' && 'diff' || 'main' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            application/e2e/playwright-report/
            application/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup .dev.vars
        if: always()
        run: rm -f apps/web/.dev.vars

  gate:
    if: ${{ !cancelled() }}
    needs: [changes, code-quality, unit-test, web-build, client-test, server-test, component-test, schema, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: いずれかのジョブが失敗していないか確認
        working-directory: ${{ github.workspace }}
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "各ジョブの結果: $results"
          if [[ "$results" == *failure* || "$results" == *cancelled* ]]; then
            echo "::error::失敗またはタイムアウトしたジョブがあります"
            exit 1
          fi

  notify-failure:
    # mainへのpushでCIが失敗した時のみ通知する(PRのCI失敗はGitHub上で気づけるため対象外)
    needs: gate
    if: ${{ failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - name: CI失敗をDiscordへ通知
        working-directory: ${{ github.workspace }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL}" ]]; then
            echo "DISCORD_WEBHOOK_URLが未設定のため通知をスキップします"
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\": \":rotating_light: mainブランチのCIが失敗しました (${COMMIT_SHA:0:7})\n${RUN_URL}\"}" \
            "${DISCORD_WEBHOOK_URL}"
