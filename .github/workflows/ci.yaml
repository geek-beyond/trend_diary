name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION_FILE: .node-version
  DATABASE_URL: file:./test.db

defaults:
  run:
    shell: bash
    working-directory: ./application

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      web: ${{ steps.detect.outputs.web }}
      e2e: ${{ steps.detect.outputs.e2e }}
      schema: ${{ steps.detect.outputs.schema }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: detect
        uses: ./.github/actions/detect-changes
        with:
          base: ${{ github.base_ref }}

  code-quality:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Lint
        run: pnpm lint

  unit-test:
    needs: changes
    if: ${{ needs.changes.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: 型チェック
        run: pnpm --filter @trend-diary/${{ matrix.package }} typecheck

      - name: テスト
        run: pnpm --filter @trend-diary/${{ matrix.package }} test

  web-build:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: 型チェック
        run: pnpm --filter @trend-diary/web typecheck

      - name: ビルド
        run: pnpm run build

  client-test:
    name: unit-test (web client)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: クライアントのテスト
        uses: ./.github/actions/test_cov
        with:
          target: client

  server-test:
    name: integration-test (web server)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Supabase Emulator のセットアップ
        uses: rin2yh/supa-emu@002534b987244b792d8a075163abc754462cd44e # v0.1.1
        with:
          version: v0.1.1
          addr: 127.0.0.1:54321

      - name: サーバーのテスト
        uses: ./.github/actions/test_cov
        with:
          target: server

  component-test:
    name: integration-test (web component)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Playwrightブラウザのキャッシュ
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-storybook-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Playwrightのセットアップ(キャッシュミス)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @trend-diary/web exec playwright install chromium --with-deps

      - name: Playwright依存のセットアップ(キャッシュヒット)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @trend-diary/web exec playwright install-deps chromium

      - name: コンポーネントのテスト
        run: pnpm --filter @trend-diary/web test --project storybook --coverage

  schema:
    needs: changes
    if: ${{ needs.changes.outputs.schema == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: マイグレーション生成（未生成の差分があれば検出）
        run: pnpm --filter @trend-diary/datastore db:generate

      - name: 生成差分の検出（差分があればドリフト）
        run: |
          git add -N packages/datastore/migrations
          git diff --exit-code -- packages/datastore/migrations

      - name: journal整合の検証
        run: pnpm --filter @trend-diary/datastore db:check

  e2e:
    name: E2E
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' && github.event_name == 'push' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Supabaseのセットアップ
        uses: ./.github/actions/setup_supabase

      - name: E2E環境のセットアップ
        uses: ./.github/actions/setup_e2e
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Create .dev.vars for Actions
        run: |
          cat > packages/web/.dev.vars <<'EOF'
          # Dev env for Actions (created from secrets)
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          SUPABASE_URL=${{ env.SUPABASE_URL || 'http://127.0.0.1:54321' }}
          SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY || '' }}
          # 本番sitekeyはheadlessで解けずトークン取得待ちがflakyになる。サーバーはsecret未設定で検証skipのため、空指定でwrangler.tomlの[vars]を上書きしウィジェットごと無効化して整合させる
          TURNSTILE_SITE_KEY=
          EOF

      - name: E2Eテストの実行
        run: pnpm --filter @trend-diary/e2e test --fail-on-flaky-tests

      - name: Playwrightレポートを保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-report-main-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            application/packages/e2e/playwright-report/
            application/packages/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup .dev.vars
        if: always()
        run: rm -f packages/web/.dev.vars

  e2e-diff:
    name: E2E (Diff)
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' && github.event_name == 'pull_request' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: setup-supabase
        name: Supabaseのセットアップ
        uses: ./.github/actions/setup_supabase

      - name: E2E環境のセットアップ
        uses: ./.github/actions/setup_e2e
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Create .dev.vars for Actions
        run: |
          cat > packages/web/.dev.vars <<'EOF'
          # Dev env for Actions (created from secrets)
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          SUPABASE_URL=${{ env.SUPABASE_URL || 'http://127.0.0.1:54321' }}
          SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY || '' }}
          # 本番sitekeyはheadlessで解けずトークン取得待ちがflakyになる。サーバーはsecret未設定で検証skipのため、空指定でwrangler.tomlの[vars]を上書きしウィジェットごと無効化して整合させる
          TURNSTILE_SITE_KEY=
          EOF

      - name: E2Eテストの差分実行
        run: pnpm --filter @trend-diary/e2e test --reporter=github,html --only-changed=origin/$GITHUB_BASE_REF --pass-with-no-tests --fail-on-flaky-tests

      - name: Playwrightレポートを保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-report-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            application/packages/e2e/playwright-report/
            application/packages/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup .dev.vars
        if: always()
        run: rm -f packages/web/.dev.vars

  gate:
    if: ${{ !cancelled() }}
    needs: [changes, code-quality, unit-test, web-build, client-test, server-test, component-test, schema, e2e, e2e-diff]
    runs-on: ubuntu-latest
    steps:
      - name: いずれかのジョブが失敗していないか確認
        working-directory: ${{ github.workspace }}
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "各ジョブの結果: $results"
          if [[ "$results" == *failure* || "$results" == *cancelled* ]]; then
            echo "::error::失敗またはタイムアウトしたジョブがあります"
            exit 1
          fi

  notify-failure:
    # mainへのpushでCIが失敗した時のみ通知する(PRのCI失敗はGitHub上で気づけるため対象外)
    needs: gate
    if: ${{ failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - name: CI失敗をDiscordへ通知
        working-directory: ${{ github.workspace }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL}" ]]; then
            echo "DISCORD_WEBHOOK_URLが未設定のため通知をスキップします"
            exit 0
          fi

          curl -fsS -H "Content-Type: application/json" \
            -d "{\"content\": \":rotating_light: mainブランチのCIが失敗しました (${COMMIT_SHA:0:7})\n${RUN_URL}\"}" \
            "${DISCORD_WEBHOOK_URL}"
