name: Check Schema Drift
description: 'DrizzleスキーマとD1マイグレーションSQLのDDL等価性を検証します'

on:
  pull_request:
    branches:
      - main
    paths:
      - 'application/src/infrastructure/drizzle-orm/schema.ts'
      - 'application/migrations/**'
      - 'application/drizzle.config.ts'
      - 'application/scripts/*.mjs'
      - '.github/workflows/drizzle.yaml'

permissions:
  contents: read

env:
  NODE_VERSION_FILE: .node-version

defaults:
  run:
    shell: bash
    working-directory: ./application

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: スキーマドリフトの検証
        run: pnpm run db:check
