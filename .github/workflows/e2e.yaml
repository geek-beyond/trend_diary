name: E2E

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/e2e.yaml"
      - "application/packages/e2e/**"
      - "application/packages/web/**"
      - "application/packages/common/**"
      - "application/packages/datastore/**"
      - "application/packages/domain/**"
      - "application/migrations/**"
      - "application/package.json"
      - "application/pnpm-lock.yaml"

# カバレッジの可視化で、コメントを残すための権限
permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash
    working-directory: ./application

# 共通の設定を定義
env:
  NODE_VERSION_FILE: .node-version

jobs:
  test:
    name: Main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Supabaseのセットアップ
        uses: ./.github/actions/setup_supabase

      - name: E2E環境のセットアップ
        uses: ./.github/actions/setup_e2e
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Create .dev.vars for Actions
        run: |
          cat > packages/web/.dev.vars <<'EOF'
          # Dev env for Actions (created from secrets)
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          SUPABASE_URL=${{ env.SUPABASE_URL || 'http://127.0.0.1:54321' }}
          SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY || '' }}
          EOF

      - name: E2Eテストの実行
        run: pnpm --filter @trend-diary/e2e test --fail-on-flaky-tests

      - name: Playwrightレポートを保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-report-main-${{ github.run_id }}-${{ github.run_attempt }}
          path: application/packages/e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Playwright成果物を保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-test-results-main-${{ github.run_id }}-${{ github.run_attempt }}
          path: application/packages/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup .dev.vars
        if: always()
        run: rm -f packages/web/.dev.vars

  test-diff:
    name: Diff
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: setup-supabase
        name: Supabaseのセットアップ
        uses: ./.github/actions/setup_supabase

      - name: E2E環境のセットアップ
        uses: ./.github/actions/setup_e2e
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Create .dev.vars for Actions
        run: |
          cat > packages/web/.dev.vars <<'EOF'
          # Dev env for Actions (created from secrets)
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          SUPABASE_URL=${{ env.SUPABASE_URL || 'http://127.0.0.1:54321' }}
          SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY || '' }}
          EOF

      - name: E2Eテストの差分実行
        run: pnpm --filter @trend-diary/e2e test --reporter=github,html --only-changed=origin/$GITHUB_BASE_REF --pass-with-no-tests --fail-on-flaky-tests

      - name: Playwrightレポートを保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-report-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: application/packages/e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Playwright成果物を保存
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-test-results-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: application/packages/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup .dev.vars
        if: always()
        run: rm -f packages/web/.dev.vars
