name: E2E

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/e2e.yaml"
      - "application/src/test/e2e/**"
      - "application/src/web/client/routes/**"
      - "application/package.json"
      - "application/package-lock.json"

# カバレッジの可視化で、コメントを残すための権限
permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash
    working-directory: ./application

# 共通の設定を定義
env:
  NODE_VERSION_FILE: .node-version
  DATABASE_URL: file:./test.db

jobs:
  test:
    name: Main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Supabaseのセットアップ
        uses: ./.github/actions/setup_supabase
        
      - name: E2E環境のセットアップ
        uses: ./.github/actions/setup_e2e
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Create .dev.vars for Actions
        run: |
          cat > .dev.vars <<'EOF'
          # Dev env for Actions (created from secrets)
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          SUPABASE_URL=${{ env.SUPABASE_URL || 'http://127.0.0.1:54321' }}
          SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY || '' }}
          DATABASE_URL=${{ env.DATABASE_URL }}
          EOF
          
      - name: E2Eテストの実行
        run: npm run e2e -- --fail-on-flaky-tests

      - name: Playwrightレポートを保存
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-report-main-${{ github.run_id }}-${{ github.run_attempt }}
          path: application/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Playwright成果物を保存
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-test-results-main-${{ github.run_id }}-${{ github.run_attempt }}
          path: application/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup .dev.vars
        if: always()
        run: rm -f .dev.vars

  test-diff:
    name: Diff
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: setup-supabase
        name: Supabaseのセットアップ
        uses: ./.github/actions/setup_supabase

      - name: E2E環境のセットアップ
        uses: ./.github/actions/setup_e2e
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Create .dev.vars for Actions
        run: |
          cat > .dev.vars <<'EOF'
          # Dev env for Actions (created from secrets)
          DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL || '' }}
          SUPABASE_URL=${{ env.SUPABASE_URL || 'http://127.0.0.1:54321' }}
          SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY || '' }}
          DATABASE_URL=${{ env.DATABASE_URL }}
          EOF

      - name: E2Eテストの差分実行
        run: npm run e2e -- --reporter=github,html --only-changed=origin/$GITHUB_BASE_REF --pass-with-no-tests --fail-on-flaky-tests

      - name: Playwrightレポートを保存
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-report-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: application/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Playwright成果物を保存
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() && !cancelled() }}
        with:
          name: playwright-test-results-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: application/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup .dev.vars
        if: always()
        run: rm -f .dev.vars
