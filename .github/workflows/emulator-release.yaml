name: emulator-release

on:
  push:
    branches: [main]
    paths:
      - 'emulator/supabase/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./emulator/supabase/go.mod
          cache-dependency-path: ./emulator/supabase/go.sum

      - name: bin をビルド
        working-directory: ./emulator/supabase
        run: |
          set -euo pipefail
          go build -o supabase-emulator-linux-amd64 .

      # emulator-latest タグに対し asset を上書き配置する。タグが無ければ自動作成。
      - name: release asset を更新
        uses: softprops/action-gh-release@v2
        with:
          tag_name: emulator-latest
          name: Supabase Emulator (latest)
          files: ./emulator/supabase/supabase-emulator-linux-amd64
          fail_on_unmatched_files: true
          make_latest: 'false'
