name: Storybook Test

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/workflows/storybook.yaml'
      - 'application/.storybook/**'
      - 'application/src/web/client/**'
      - 'application/src/test/vitest/storybook/**'
      - 'application/package.json'
      - 'application/package-lock.json'

permissions:
  contents: read

# 共通の設定を定義
env:
  NODE_VERSION_FILE: .node-version

defaults:
  run:
    shell: bash
    working-directory: ./application

jobs:
  storybook:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Playwrightブラウザのキャッシュ
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Playwrightのセットアップ(キャッシュミス)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      # キャッシュヒット時はブラウザ本体の再DLは不要だが、システム依存(apt)は
      # ランナーごとに必要なため毎回インストールする
      - name: Playwright依存のセットアップ(キャッシュヒット)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: ブラウザ起動の事前確認(調査用)
        run: |
          set +e
          node -e "
            const { chromium } = require('playwright');
            (async () => {
              try {
                const b = await chromium.launch({ headless: true });
                console.log('BROWSER_LAUNCH_OK');
                await b.close();
              } catch (e) {
                console.log('::error::BROWSER_LAUNCH_FAIL ' + String(e && e.message || e).split('\n').slice(0,3).join(' | '));
                process.exit(7);
              }
            })();
          "

      - name: Storybookテストの実行
        run: |
          set +e
          npm run test-storybook -- --reporter=default --reporter=github-actions 2>&1 | tee /tmp/storybook-test.log
          code=${PIPESTATUS[0]}
          echo "exit-code=${code}" >> /tmp/storybook-test.log
          exit "$code"

      - name: テストログを保存(調査用)
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: storybook-test-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/storybook-test.log
          if-no-files-found: ignore
          retention-days: 7
