name: Storybook Test

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/workflows/storybook.yaml'
      - 'application/.storybook/**'
      - 'application/src/web/client/**'
      - 'application/src/test/vitest/storybook/**'
      - 'application/package.json'
      - 'application/package-lock.json'

permissions:
  contents: read

# 共通の設定を定義
env:
  NODE_VERSION_FILE: .node-version

defaults:
  run:
    shell: bash
    working-directory: ./application

jobs:
  storybook:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Playwrightブラウザのキャッシュ
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Playwrightのセットアップ
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Storybookテストの実行
        run: |
          set +e
          npm run test-storybook -- --reporter=default --reporter=github-actions 2>&1 | tee /tmp/storybook-test.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ]; then
            echo "::group::Storybook テスト失敗ログ (末尾)"
            tail -n 80 /tmp/storybook-test.log
            echo "::endgroup::"
            tail -n 60 /tmp/storybook-test.log | sed 's/%/%25/g; s/\r//g' | while IFS= read -r line; do
              echo "::error::${line}"
            done
          fi
          exit "$code"
