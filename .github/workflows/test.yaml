name: Test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test.yaml'
      - 'application/packages/web/.storybook/**'
      - 'application/src/**'
      - 'application/packages/**'
      - 'application/migrations/**'
      - 'application/package.json'
      - 'application/pnpm-lock.yaml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/test.yaml'
      - 'application/packages/web/.storybook/**'
      - 'application/src/**'
      - 'application/packages/**'
      - 'application/migrations/**'
      - 'application/package.json'
      - 'application/pnpm-lock.yaml'

# カバレッジの可視化で、コメントを残すための権限
permissions:
  contents: read
  pull-requests: write

# 共通の設定を定義
env:
  NODE_VERSION_FILE: .node-version
  DATABASE_URL: file:./test.db

defaults:
  run:
    shell: bash
    working-directory: ./application

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      test_runner: ubuntu-latest
      run_client_test: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || steps.check-test-config.outputs.diff-count != 0 || steps.check-client.outputs.diff-count != 0 }}
      run_server_test: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || steps.check-test-config.outputs.diff-count != 0 || steps.check-server.outputs.diff-count != 0 }}
      run_component_test: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || steps.check-test-config.outputs.diff-count != 0 || steps.check-client.outputs.diff-count != 0 || steps.check-storybook.outputs.diff-count != 0 }}
      # 変更された同質パッケージ(＋依存先)のみを動的マトリクスで回す。該当なしは []。
      packages: ${{ steps.detect-packages.outputs.result }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # pnpm の依存グラフ差分(merge-base)を取るため全履歴が必要
          fetch-depth: 0

      - name: テスト設定ファイルの差分チェック
        id: check-test-config
        uses: ./.github/actions/diff
        with:
          subdir: '.github/workflows/test.yaml application/packages/web/src/test/vitest/'

      - name: クライアントの差分チェック
        id: check-client
        uses: ./.github/actions/diff
        with:
          subdir: 'application/packages/web/src/client'
          exclude_pattern: 'application/packages/web/src/client/components/shadcn'

      - name: サーバーの差分チェック
        id: check-server
        uses: ./.github/actions/diff
        with:
          subdir: 'application/packages/web/src/server application/migrations'

      - name: Storybook設定の差分チェック
        id: check-storybook
        uses: ./.github/actions/diff
        with:
          subdir: 'application/packages/web/.storybook'

      # 同質パッケージ(common/datastore/domain/notification)は、依存グラフ上
      # 変更された(＋依存先になった)ものだけを pnpm 検知でマトリクス化する。
      - name: 変更パッケージの検知
        id: changed
        uses: ./.github/actions/changed-packages
        with:
          scope: 'common datastore domain notification'
          base: ${{ github.base_ref }}

      - name: マトリクス対象の確定
        id: detect-packages
        run: |
          # テスト設定ファイルの変更時は影響範囲が読めないため全同質パッケージを実行する。
          if [[ "${{ steps.check-test-config.outputs.diff-count }}" != "0" ]]; then
            echo 'result=["common","datastore","domain","notification"]' >> "$GITHUB_OUTPUT"
          else
            echo 'result=${{ steps.changed.outputs.packages }}' >> "$GITHUB_OUTPUT"
          fi

      - name: 差分結果の表示
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "メインブランチなので、リグレッションテストとして全て実行"
          else
            echo "テスト設定差分: ${{ steps.check-test-config.outputs.diff-count }} ファイル"
            echo "クライアント差分: ${{ steps.check-client.outputs.diff-count }} ファイル"
            echo "サーバー差分: ${{ steps.check-server.outputs.diff-count }} ファイル"
            echo "Storybook設定差分: ${{ steps.check-storybook.outputs.diff-count }} ファイル"
            echo "パッケージマトリクス: ${{ steps.detect-packages.outputs.result }}"
          fi
        shell: bash

  client:
    needs: setup
    runs-on: ${{ needs.setup.outputs.test_runner }}
    if: ${{ needs.setup.outputs.run_client_test == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: クライアントのテスト
        uses: ./.github/actions/test_cov
        with:
          target: client

  server:
    needs: setup
    runs-on: ${{ needs.setup.outputs.test_runner }}
    if: ${{ needs.setup.outputs.run_server_test == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Supabase Emulator のセットアップ
        uses: rin2yh/supa-emu@002534b987244b792d8a075163abc754462cd44e # v0.1.1
        with:
          version: v0.1.1
          addr: 127.0.0.1:54321

      - name: サーバーのテスト
        uses: ./.github/actions/test_cov
        with:
          target: server

  # node + vitest だけで完結する同質パッケージのテスト。
  # changed-packages アクションが算出した「変更パッケージ＋依存先」だけを動的マトリクスで回す。
  # 特殊な環境が要るもの(server=supabase, component=playwright)は専用ジョブ、
  # cron は別ワークフロー(cron-test.yaml)で扱う。
  package:
    needs: setup
    runs-on: ${{ needs.setup.outputs.test_runner }}
    if: ${{ needs.setup.outputs.packages != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.setup.outputs.packages) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: 型チェック
        run: pnpm --filter @trend-diary/${{ matrix.package }} typecheck

      - name: テスト
        run: pnpm --filter @trend-diary/${{ matrix.package }} test

  component:
    needs: setup
    runs-on: ${{ needs.setup.outputs.test_runner }}
    if: ${{ needs.setup.outputs.run_component_test == 'true' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Node.jsの構築
        uses: ./.github/actions/setup_node
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Playwrightブラウザのキャッシュ
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-storybook-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Playwrightのセットアップ(キャッシュミス)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @trend-diary/web exec playwright install chromium --with-deps

      - name: Playwright依存のセットアップ(キャッシュヒット)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @trend-diary/web exec playwright install-deps chromium

      - name: コンポーネントのテスト
        run: pnpm --filter @trend-diary/web test-storybook --coverage
