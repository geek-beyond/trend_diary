packages:
  - 'apps/*'
  - 'packages/*'
  - 'e2e'

# パッケージ間で共有する依存のバージョンを集中管理する。
# 各パッケージでは "<dep>": "catalog:" と宣言してここのバージョンを参照する。
catalog:
  '@cloudflare/vitest-pool-workers': ^0.18.4
  '@cloudflare/workers-types': ^5.20260711.1
  '@faker-js/faker': ^10.5.0
  '@playwright/test': ^1.61.1
  '@types/node': ^26.1.1
  drizzle-orm: 0.45.2
  hono: ^4.12.29
  neverthrow: ^8.2.0
  pino: ^10.3.1
  playwright: ^1.61.1
  vitest: ^4.1.10
  vitest-mock-extended: ^4.0.0
  wrangler: ^4.110.0
  zod: ^4.4.3

allowBuilds:
  esbuild: false
  sharp: false
  workerd: false

minimumReleaseAge: 4320

overrides:
  '@esbuild-kit/core-utils>esbuild': ^0.25.0
  '@hono/node-server': ^1.19.13
  brace-expansion: ^2.0.3
  defu: ^6.1.5
  effect: ^3.20.0
  lodash: ^4.18.1
  picomatch: ^4.0.4
