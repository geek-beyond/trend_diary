# https://pnpm.io/settings

# 依存パッケージのビルドスクリプトは全て拒否（旧 .npmrc の ignore-scripts=true を踏襲した
# サプライチェーン対策）。新たにビルドスクリプトを持つ依存は install がエラーになり明示判断を促す。
# prisma はエンジン取得が prisma generate 側で完結するため許可不要（CIで確認済み）。
allowBuilds:
  '@prisma/client': false
  '@prisma/engines': false
  esbuild: false
  prisma: false
  sharp: false
  workerd: false

# 公開直後のパッケージを避けサプライチェーン攻撃リスクを低減（4320分=3日、旧 .npmrc 相当）
minimumReleaseAge: 4320

overrides:
  '@hono/node-server': ^1.19.13
  brace-expansion: ^2.0.3
  defu: ^6.1.5
  effect: ^3.20.0
  lodash: ^4.18.1
  picomatch: ^4.0.4
