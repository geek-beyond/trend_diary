name = "trend-diary-cron"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = "./src/worker.ts"
workers_dev = false

# 本番のログレベル方針。PII を含む debug クエリログを常時出力しないよう info を明示する
[vars]
LOG_LEVEL = "info"

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["0 */1 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "trend-diary-db"
database_id = "15dfd380-5a78-4237-8e59-49640c2e954f"
migrations_dir = "../../packages/datastore/migrations"
