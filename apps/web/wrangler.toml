name = "trend-diary"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
main = "./src/worker.ts"
assets = { directory = "./build/client" }

# 本番のログレベル方針。PII を含む debug クエリログを常時出力しないよう info を明示する
[vars]
LOG_LEVEL = "info"
# Cloudflare TurnstileのサイトキーはHTMLに埋め込まれる公開値のため[vars]で管理する
TURNSTILE_SITE_KEY = "0x4AAAAAADiD2o4io1Au9fnq"

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "trend-diary-db"
database_id = "15dfd380-5a78-4237-8e59-49640c2e954f"
migrations_dir = "../../packages/datastore/migrations"

# 認証系エンドポイントへのブルートフォース・大量試行を抑止するためのレートリミット
[[ratelimits]]
name = "AUTH_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 10, period = 60 }
